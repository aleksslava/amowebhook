{% extends "base.html" %}
{% block title %}Смена пароля · Производство{% endblock %}
{% block content %}
<a class="back-link" href="/cabinet/admin/users">← К пользователям</a>
<header class="page-heading narrow-heading">
    <div>
        <p class="eyebrow">Управление доступом</p>
        <h1>Сменить пароль</h1>
        <p class="muted">Пользователь: <strong>{{ user.name }}</strong></p>
    </div>
</header>
<form method="post" action="/cabinet/admin/users/{{ user.id }}/password" class="form-stack user-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    {% if error %}<p class="form-error" role="alert">{{ error }}</p>{% endif %}
    <label><span>Новый пароль</span><input type="password" name="password" maxlength="128" autocomplete="new-password" required autofocus><small>От 1 до 128 символов</small></label>
    <label><span>Повторите пароль</span><input type="password" name="password_confirmation" maxlength="128" autocomplete="new-password" required></label>
    <div class="form-actions"><button class="primary-button" type="submit">Сохранить пароль</button><a href="/cabinet/admin/users">Отмена</a></div>
</form>
{% endblock %}
