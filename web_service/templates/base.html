<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Производство{% endblock %}</title>
    <link rel="stylesheet" href="/cabinet/assets/app.css">
</head>
<body class="{% block body_class %}{% endblock %}">
{% if current_user %}
<header class="topbar">
    <a class="brand" href="/cabinet/orders" aria-label="Заказы на производство">
        <span class="brand-mark">П</span>
        <span>Производство</span>
    </a>
    <nav class="main-nav" aria-label="Основная навигация">
        <a href="/cabinet/orders" class="{% if request.url.path.startswith('/cabinet/orders') %}active{% endif %}">Заказы</a>
        {% if current_user.is_admin %}
        <a href="/cabinet/admin/users" class="{% if request.url.path.startswith('/cabinet/admin/users') %}active{% endif %}">Пользователи</a>
        {% endif %}
    </nav>
    <div class="account">
        <span class="account-name">{{ current_user.name }}</span>
        {% if current_user.is_admin %}<span class="role">Администратор</span>{% endif %}
        <form method="post" action="/cabinet/logout">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button class="link-button" type="submit">Выйти</button>
        </form>
    </div>
</header>
{% endif %}
<main class="{% if current_user %}workspace{% else %}login-workspace{% endif %}">
    {% block content %}{% endblock %}
</main>
</body>
</html>
